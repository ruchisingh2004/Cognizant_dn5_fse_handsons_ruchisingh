<h2>Reactive Enrollment Form</h2>

<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()"
>

  <!-- Student Name -->
  <div>

    <label>Student Name:</label>

    <input
      type="text"
      formControlName="studentName"
    >

    <span
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['required']
      "
      style="color: red;"
    >
      Name is required
    </span>

    <span
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['minlength']
      "
      style="color: red;"
    >
      Name must be at least 3 characters
    </span>

  </div>

  <br>


  <!-- Student Email -->
  <div>

    <label>Student Email:</label>

    <input
      type="email"
      formControlName="studentEmail"
    >

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.touched &&
        enrollForm.get('studentEmail')?.errors?.['required']
      "
      style="color: red;"
    >
      Email is required
    </span>

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.errors?.['email']
      "
      style="color: red;"
    >
      Enter a valid email
    </span>

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.pending
      "
    >
      Checking email...
    </span>

    <span
      *ngIf="
        enrollForm.get('studentEmail')?.errors?.['emailTaken']
      "
      style="color: red;"
    >
      Email taken
    </span>

  </div>

  <br>


  <!-- Course ID -->
  <div>

    <label>Course ID:</label>

    <input
      type="text"
      formControlName="courseId"
    >

    <span
      *ngIf="
        enrollForm.get('courseId')?.errors?.['noCourseCode']
      "
      style="color: red;"
    >
      Course code starting with XX is not allowed.
    </span>

  </div>

  <br>


  <!-- Semester -->
  <div>

    <label>Preferred Semester:</label>

    <select formControlName="preferredSemester">

      <option value="Odd">
        Odd
      </option>

      <option value="Even">
        Even
      </option>

    </select>

  </div>

  <br>


  <!-- Terms -->
  <div>

    <label>

      <input
        type="checkbox"
        formControlName="agreeToTerms"
      >

      I agree to the terms

    </label>

  </div>

  <br>


  <!-- Additional Courses -->

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()"
  >
    Add Another Course
  </button>

  <br><br>


  <div
    *ngFor="
      let ctrl of additionalCourses.controls;
      let i = index
    "
  >

    <label>
      Additional Course {{ i + 1 }}:
    </label>

    <input
      type="text"
      [formControl]="ctrl"
    >

    <button
      type="button"
      (click)="removeCourse(i)"
    >
      Remove
    </button>

    <br><br>

  </div>


  <!-- Submit -->

  <button
    type="submit"
    [disabled]="enrollForm.invalid"
  >
    Submit
  </button>

</form>

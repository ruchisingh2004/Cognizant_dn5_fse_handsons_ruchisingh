<h1>Available Courses</h1>

<div *ngFor="let course of courses">

  <app-course-card
      *ngIf="course.available"
      [title]="course.title"
      [instructor]="course.instructor"
      [duration]="course.duration"
      (enroll)="onEnroll($event)">
  </app-course-card>

  <p>
    Course Fee:
    <strong>{{ course.fee | currency:'INR' }}</strong>
  </p>

  <hr>

</div>
